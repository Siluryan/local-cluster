{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "crm.fullname" . }}-postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "crm.postgresSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeys.db }}
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeys.user }}
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeys.password }}
{{- end }}
